version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      # select2 is pinned to a git ref (github:select2/select2#3.5.4), which the
      # lockfile records as a git commit SHA. Dependabot tries to resolve that
      # SHA as an npm registry version and always fails, so skip it.
      - dependency-name: "select2"
    groups:
      rollup:
        dependency-type: "development"
        patterns:
          - "@rollup/*"
          - "rollup"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "capybara*"
          - "bootsnap"
          - "listen"
          - "factory*"
          - "puma"
          - "rails-controller-testing"
          - "rspec-*"
          - "simplecov"
          - "selenium-webdriver"
          - "shoulda-matchers"
          - "timecop"
          - "webmock"
          - "web-console"
        update-types:
          - "minor"
          - "patch"
      rails:
        dependency-type: "production"
        patterns:
          - "action*"
          - "active*"
          - "rails"
          - "railties"
        update-types:
          - "patch"
