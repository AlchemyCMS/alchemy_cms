version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    # Wait before opening update PRs so brand-new releases have time to be
    # vetted, and so CI's minimum release age policy does not reject the
    # freshly published versions Dependabot would otherwise propose.
    cooldown:
      default-days: 7
      semver-major-days: 30
    ignore:
      # cropperjs 2.x removed the bundled stylesheet imported from admin.scss;
      # the major upgrade needs manual migration before it can be taken.
      - dependency-name: "cropperjs"
        update-types: ["version-update:semver-major"]
    groups:
      rollup:
        dependency-type: "development"
        patterns:
          - "@rollup/*"
          - "rollup"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "capybara*"
          - "bootsnap"
          - "listen"
          - "factory*"
          - "puma"
          - "rails-controller-testing"
          - "rspec-*"
          - "simplecov"
          - "selenium-webdriver"
          - "shoulda-matchers"
          - "timecop"
          - "webmock"
          - "web-console"
        update-types:
          - "minor"
          - "patch"
      rails:
        dependency-type: "production"
        patterns:
          - "action*"
          - "active*"
          - "rails"
          - "railties"
        update-types:
          - "patch"
