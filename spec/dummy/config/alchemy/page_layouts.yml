- name: index
  unique: true
  elements:
    - all_you_can_eat
  autogenerate:
    - all_you_can_eat

- name: readonly
  fixed_attributes:
    public_on: ~
    public_until: ~
    restricted: false
    name: false
    urlname: false
    title: false
    robot_index: false
    robot_follow: false
    meta_keywords: ~
    meta_description: ~

- name: standard
  elements: [article, header, slider, download]
  autogenerate: [header, article, download]
  cache: 60

- name: everything
  hint: true
  elements:
    [
      text,
      all_you_can_eat,
      gallery,
      right_column,
      left_column,
      old,
      article,
      element_with_ingredient_groups,
      tinymce_custom
    ]
  autogenerate: [all_you_can_eat, left_column, right_column]

- name: news
  unique: true
  insert_elements_at: top
  elements: [headline, news]
  autogenerate: [news]

- name: search
  searchresults: true

- name: contact
  unique: true
  cache: false
  elements: [headline, text, contactform]
  autogenerate: [headline, text, contactform]

- name: footer
  elements:
    - menu
  layoutpage: true

- name: product_detail
  url_pattern: ":id"
  url_constraints: integer
  elements: [article]

- name: user_profile
  url_pattern: ":uuid/profile"
  url_constraints:
    uuid: "uuid"
  elements: [article]

- name: blog_post
  url_pattern: ":year/:slug"
  url_constraints:
    year: "integer"
    slug: "string"
  elements: [article]

- name: product_by_slug
  url_pattern: ":slug"
  elements: [article]

- name: product_by_sku
  url_pattern: ":sku"
  url_constraints:
    sku: !ruby/regexp /\A[A-Z]{2}-\d{4}\z/
  elements: [article]

- name: <%= 'erb_' + 'layout' %>
  unique: true
